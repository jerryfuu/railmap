<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>でんしゃ ろせんず ｜ 首都圏</title>
<style>
  :root{
    --ink:#2f3640;
    --ink-soft:#5b6675;
    --furi:#8a93a3;
    --card:rgba(255,255,255,.92);
    --card-line:rgba(120,140,170,.28);
    --accent:#ff8c42;
    --jp:"Hiragino Maru Gothic ProN","Hiragino Maru Gothic Pro","Yu Gothic Medium","YuGothic","Meiryo",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:
      radial-gradient(1100px 700px at 78% -8%, #dcefff 0%, transparent 60%),
      radial-gradient(900px 800px at 5% 108%, #fff2da 0%, transparent 55%),
      linear-gradient(180deg,#eaf5ff 0%, #fbf6ec 100%);
    color:var(--ink);
    font-family:var(--jp);
    overflow:hidden;
    -webkit-text-size-adjust:100%;
  }
  #stage{position:fixed;inset:0}
  #map{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
  #map.drag{cursor:grabbing}

  .card{
    position:fixed;background:var(--card);
    border:1.5px solid var(--card-line);border-radius:20px;
    backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(70,100,140,.18);
  }
  #title{left:16px;top:14px;padding:14px 18px 15px;max-width:min(72vw,400px)}
  #title h1{margin:0;font-size:21px;font-weight:800;letter-spacing:.02em;line-height:1.25}
  #title p{margin:7px 0 0;font-size:12.5px;color:var(--ink-soft);line-height:1.6}

  #searchWrap{right:16px;top:14px;width:min(52vw,280px);padding:11px}
  #search{
    width:100%;border:2px solid #e3e9f1;outline:none;background:#fff;color:var(--ink);
    font-family:var(--jp);font-size:16px;padding:11px 14px;border-radius:14px;
  }
  #search::placeholder{color:#a7b0bd}
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,140,66,.16)}
  #sug{margin:9px 0 0;max-height:260px;overflow:auto;display:none}
  #sug.open{display:block}
  .sug{display:flex;align-items:center;gap:10px;padding:9px 9px;border-radius:12px;cursor:pointer}
  .sug:hover{background:#f1f6fc}
  .sug .nm{display:flex;flex-direction:column;line-height:1.15}
  .sug .nm b{font-size:15px;font-weight:700}
  .sug .nm em{font-size:10.5px;color:var(--furi);font-style:normal}
  .sug .dotrow{margin-left:auto;display:flex;gap:3px}
  .sug .dotrow i{width:9px;height:9px;border-radius:50%;display:block}

  #legend{left:16px;bottom:16px;width:min(86vw,300px);padding:14px 14px 15px;max-height:min(60vh,520px);display:flex;flex-direction:column}
  #legend h2{margin:0 0 11px;font-size:14px;font-weight:800;color:var(--ink);display:flex;align-items:center}
  #legend h2 small{font-weight:600;color:var(--ink-soft);font-size:11px;margin-left:6px}
  #legClose{display:none;margin-left:auto;border:none;background:#eef2f7;color:var(--ink-soft);
    width:30px;height:30px;border-radius:9px;font-size:16px;font-weight:800;cursor:pointer;line-height:1}
  #legendBtn{display:none;left:16px;bottom:16px;padding:13px 18px;font-size:15px;font-weight:800;
    color:var(--ink);cursor:pointer;align-items:center;gap:8px;border-radius:16px}
  #legendBtn:active{transform:scale(.95)}
  .grpbtns{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
  .grpbtn{
    flex:1 1 auto;font-family:var(--jp);font-size:13px;font-weight:700;color:var(--ink);
    background:#fff;border:2px solid #e3e9f1;padding:8px 6px;border-radius:13px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s;white-space:nowrap;
  }
  .grpbtn .sw{width:12px;height:12px;border-radius:4px;flex:none}
  .grpbtn.off{opacity:.35}
  .grpbtn:active{transform:scale(.96)}
  #lines{overflow:auto;margin:0;padding:2px;display:grid;grid-template-columns:1fr 1fr;gap:3px 12px}
  .lrow{display:flex;align-items:center;gap:9px;padding:5px 4px;cursor:pointer;border-radius:9px}
  .lrow:hover{background:#f1f6fc}
  .lrow.off{opacity:.32}
  .lrow .bar{width:20px;height:6px;border-radius:4px;flex:none}
  .lrow span{font-size:12.5px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  #zoom{right:16px;bottom:16px;display:flex;flex-direction:column;padding:0;overflow:hidden}
  #zoom button{
    width:58px;height:56px;border:none;background:#fff;color:var(--ink);
    font-size:26px;font-weight:800;cursor:pointer;font-family:var(--jp);
    display:flex;align-items:center;justify-content:center;transition:.12s;
  }
  #zoom button+button{border-top:2px solid #eef2f7}
  #zoom button:hover{background:#fff6ee;color:var(--accent)}
  #zoom button:active{transform:scale(.93)}
  #zoom .z-reset{font-size:15px;font-weight:800}

  #tip{
    position:fixed;pointer-events:none;z-index:30;display:none;
    background:#fff;border:2px solid var(--card-line);border-radius:14px;padding:11px 13px;
    box-shadow:0 12px 30px rgba(70,100,140,.28);max-width:240px;
  }
  #tip b{font-size:17px;font-weight:800}
  #tip .furi{font-size:11px;color:var(--furi);margin-top:2px}
  #tip .tlines{display:flex;flex-direction:column;gap:4px;margin-top:9px}
  #tip .tline{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);font-weight:600}
  #tip .tline i{width:14px;height:5px;border-radius:3px;flex:none}

  #hint{
    position:fixed;left:50%;bottom:16px;transform:translateX(-50%);
    font-size:12.5px;font-weight:700;color:#7a8694;
    background:rgba(255,255,255,.78);padding:7px 16px;border-radius:22px;pointer-events:none;
    box-shadow:0 4px 14px rgba(70,100,140,.14);transition:opacity .6s;
  }
  #playBtn{
    position:fixed;left:50%;top:16px;transform:translateX(-50%);z-index:22;
    background:linear-gradient(180deg,#ffab5e,#ff8121);color:#fff;border:none;
    font-family:var(--jp);font-size:15px;font-weight:800;letter-spacing:.02em;
    padding:12px 22px;border-radius:18px;cursor:pointer;
    box-shadow:0 8px 22px rgba(255,129,33,.42)}
  #playBtn:hover{filter:brightness(1.05)}
  #playBtn:active{transform:translateX(-50%) scale(.95)}
  #quizBar{
    position:fixed;left:50%;top:12px;transform:translateX(-50%);z-index:23;display:none;
    width:min(94vw,540px);padding:13px 16px 14px;text-align:center}
  #quizBar.on{display:block}
  #quizBar .q{font-size:21px;font-weight:800;color:var(--ink);line-height:1.35;text-wrap:balance}
  #quizBar .msg{font-size:16px;font-weight:800;color:var(--accent);min-height:22px;margin-top:5px}
  #quizBar .chips{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:8px;flex-wrap:wrap}
  #quizBar .chip{background:#fff;border:2px solid #eef2f7;border-radius:12px;padding:5px 12px;font-size:13px;font-weight:800}
  #quizBar .chip.star{color:#f5a201}
  #quizBar button{font-family:var(--jp);border:2px solid #eef2f7;background:#fff;border-radius:12px;padding:6px 12px;font-size:14px;font-weight:800;cursor:pointer}
  #quizBar button:active{transform:scale(.95)}
  @media (max-width:760px){
    #playBtn{top:auto;bottom:78px;font-size:14px;padding:11px 18px}
    body.quizzing #title,body.quizzing #searchWrap{display:none}
    #quizBar .q{font-size:18px}
    #title{max-width:none;padding:10px 14px}
    #title h1{font-size:16px;white-space:nowrap}
    #title h1 .hideSm{display:none}
    #title p{display:none}
    #searchWrap{width:min(54vw,210px);padding:9px}
    #search{font-size:15px;padding:9px 11px}
    #legend{width:min(92vw,330px);max-height:72vh;display:none}
    #legend.open{display:flex}
    #lines{grid-template-columns:1fr 1fr}
    #legClose{display:flex;align-items:center;justify-content:center}
    #legendBtn{display:flex}
    #zoom button{width:52px;height:50px;font-size:23px}
    #zoom .z-reset{font-size:12px}
    #hint{display:none}
    #tip b{font-size:18px}
  }
  @media (max-width:420px){
    #lines{grid-template-columns:1fr}
  }
</style>

<div id="stage"><canvas id="map"></canvas></div>

<div id="title" class="card">
  <h1>🚃 <span class="hideSm">でんしゃ </span>ろせんず</h1>
  <p>首都圏（しゅとけん）の JR・ちかてつ・してつ。ゆびで うごかして、おおきく すると えきの なまえが でてくるよ！</p>
</div>

<div id="searchWrap" class="card">
  <input id="search" type="text" placeholder="えきを さがす（れい：しんじゅく）" autocomplete="off" spellcheck="false">
  <div id="sug"></div>
</div>

<button id="legendBtn" class="card">🚇 ろせん</button>

<div id="legend" class="card">
  <h2>ろせん <small>いろで わかれているよ</small><button id="legClose" title="とじる">✕</button></h2>
  <div class="grpbtns" id="grpbtns"></div>
  <div id="lines"></div>
</div>

<div id="zoom" class="card">
  <button id="zin" title="おおきく">＋</button>
  <button id="zout" title="ちいさく">−</button>
  <button id="zreset" class="z-reset" title="ぜんぶ みる">ぜんぶ</button>
</div>

<div id="tip"></div>
<div id="hint">ホイール＝ズーム ・ ドラッグ＝うごかす ・ えきを さわると くわしく でるよ</div>

<button id="playBtn">🎮 クイズで あそぶ</button>
<div id="quizBar" class="card">
  <div class="q" id="quizQ"></div>
  <div class="msg" id="quizMsg"></div>
  <div class="chips">
    <span class="chip star" id="quizScore">⭐ 0</span>
    <span class="chip" id="quizStreak">れんぞく 0</span>
    <button id="quizMute" title="おと">🔊</button>
    <button id="quizSkip" title="つぎ">つぎ ▶</button>
    <button id="quizClose" title="おわり">やめる</button>
  </div>
</div>

/* ===== キャンバス & ビュー ===== */
const cv=document.getElementById('map'),ctx=cv.getContext('2d');
let DPR=Math.min(window.devicePixelRatio||1,2),CW=0,CH=0;
const view={scale:1,cx:0,cy:0};
const hidden={},hiddenGroup={};
let fitScale=1,fitDone=false;
let drawScheduled=false,interacting=false,interactTimer=null;
function scheduleDraw(){if(drawScheduled)return;drawScheduled=true;requestAnimationFrame(()=>{drawScheduled=false;draw();});}
function markInteract(){interacting=true;if(interactTimer)clearTimeout(interactTimer);interactTimer=setTimeout(()=>{interacting=false;scheduleDraw();},150);}

function computeFit(){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  stList.forEach(s=>{if(s.wx<minx)minx=s.wx;if(s.wx>maxx)maxx=s.wx;if(s.wy<miny)miny=s.wy;if(s.wy>maxy)maxy=s.wy;});
  const sx=CW/((maxx-minx)||1),sy=CH/((maxy-miny)||1);
  fitScale=Math.min(sx,sy)*0.9;
  view.scale=fitScale;view.cx=(minx+maxx)/2;view.cy=(miny+maxy)/2;
}
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  CW=cv.clientWidth;CH=cv.clientHeight;
  cv.width=Math.round(CW*DPR);cv.height=Math.round(CH*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(CW>0&&CH>0&&!fitDone){computeFit();fitDone=true;}
  draw();
}
function w2s(wx,wy){return[(wx-view.cx)*view.scale+CW/2,(wy-view.cy)*view.scale+CH/2];}
function s2w(sx,sy){return[(sx-CW/2)/view.scale+view.cx,(sy-CH/2)/view.scale+view.cy];}
const MINS=()=>fitScale*0.55,MAXS=()=>fitScale*22;
function clampScale(v){return Math.max(MINS(),Math.min(MAXS(),v));}
function lineVisible(li){return!hidden[li];}
function visLines(st){return st.lines.filter(lineVisible);}

let _jp=null;function getJP(){if(!_jp)_jp=getComputedStyle(document.body).fontFamily;return _jp;}

/* ===== 描画 ===== */
let hoverSt=null,flashSt=null,flashUntil=0;
let particles=[];
const quiz={on:false,target:null,score:0,streak:0,misses:0,collected:new Set()};
let muted=false,actx=null;

function drawGeo(){
  // 東京湾（うみ）
  ctx.beginPath();
  for(let i=0;i<BAY.length;i++){const[wx,wy]=proj(BAY[i][0],BAY[i][1]);const[sx,sy]=w2s(wx,wy);i?ctx.lineTo(sx,sy):ctx.moveTo(sx,sy);}
  ctx.closePath();ctx.fillStyle="rgba(125,190,225,.30)";ctx.fill();
  // かわ（多摩川・荒川・江戸川 ＝ おおよその けんざかい）
  ctx.lineCap="round";ctx.lineJoin="round";
  const rw=Math.max(2.5,Math.min(10,view.scale*0.0011));
  ctx.strokeStyle="rgba(125,190,225,.6)";ctx.lineWidth=rw;
  for(const rv of RIVERS){ctx.beginPath();for(let i=0;i<rv.pts.length;i++){const[wx,wy]=proj(rv.pts[i][0],rv.pts[i][1]);const[sx,sy]=w2s(wx,wy);i?ctx.lineTo(sx,sy):ctx.moveTo(sx,sy);}ctx.stroke();}
  // 都道府県の なまえ（うすく）
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillStyle="rgba(95,115,135,.26)";
  const pf=Math.max(18,Math.min(46,view.scale*0.0042));
  ctx.font="800 "+pf+"px "+getJP();
  for(const p of PREFS){const[wx,wy]=proj(p.p[0],p.p[1]);const[sx,sy]=w2s(wx,wy);if(sx<-120||sx>CW+120||sy<-60||sy>CH+60)continue;ctx.fillText(p.n,sx,sy);}
  // うみ・かわ の なまえ
  ctx.fillStyle="rgba(70,140,180,.65)";ctx.font="700 12px "+getJP();
  const[bx,by]=w2s.apply(null,proj(139.97,35.45));ctx.fillText("東京湾",bx,by);
  for(const rv of RIVERS){const m=rv.pts[Math.floor(rv.pts.length/2)];const[wx,wy]=proj(m[0],m[1]);const[sx,sy]=w2s(wx,wy);ctx.fillText(rv.n,sx,sy-9);}
}

function draw(){
  ctx.clearRect(0,0,CW,CH);
  drawGeo();
  const zoomR=view.scale/fitScale;
  const lw=Math.max(3,Math.min(9,view.scale*0.0011));

  ctx.lineJoin="round";ctx.lineCap="round";
  // 白いふちどり（路線が きれいに わかれて みえる）
  ctx.strokeStyle="rgba(255,255,255,.95)";
  for(let li=0;li<LINES.length;li++){if(!lineVisible(li))continue;ctx.lineWidth=lw+4.5;strokeLine(LINES[li]);}
  // 路線の いろ
  for(let li=0;li<LINES.length;li++){if(!lineVisible(li))continue;const L=LINES[li];ctx.strokeStyle=L.c;ctx.lineWidth=lw;strokeLine(L);}

  // えきの まる
  const showMinor=zoomR>1.5;
  const rBase=Math.max(2.4,Math.min(8,view.scale*0.00078));
  for(const st of stList){
    const vis=visLines(st);if(!vis.length)continue;
    const[sx,sy]=w2s(st.wx,st.wy);
    if(sx<-40||sx>CW+40||sy<-40||sy>CH+40)continue;
    const major=st.deg>=3;
    if(!major&&!showMinor)continue;
    const inter=vis.length>=2||major;
    const r=inter?rBase+1.4:rBase;
    if(inter){
      ctx.beginPath();ctx.arc(sx,sy,r+2,0,7);ctx.fillStyle="#fff";ctx.fill();
      ctx.lineWidth=2.4;ctx.strokeStyle=vis.length>=2?"#3a4150":LINES[vis[0]].c;ctx.stroke();
      if(vis.length>=2){ctx.beginPath();ctx.arc(sx,sy,Math.max(2,r-1),0,7);ctx.fillStyle="#3a4150";ctx.fill();}
    }else{
      ctx.beginPath();ctx.arc(sx,sy,r+1.6,0,7);ctx.fillStyle="#fff";ctx.fill();
      ctx.beginPath();ctx.arc(sx,sy,r,0,7);ctx.fillStyle=LINES[vis[0]].c;ctx.fill();
    }
    if(quiz.collected.has(st.name)){ctx.font="12px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("⭐",sx+r+4,sy-r-3);}
  }

  // ランドマークの アイコン（ちしき）。重なるときは省き、ズームで ぜんぶ でる
  const placed=[];
  function overlaps(b){for(const p of placed){if(b.x<p.x+p.w&&b.x+b.w>p.x&&b.y<p.y+p.h&&b.y+b.h>p.y)return true;}return false;}
  const named=new Set();
  function placeName(st,force){
    const vis=visLines(st);if(!vis.length)return false;
    const major=st.deg>=4,land=!!LAND[st.name];
    const[sx,sy]=w2s(st.wx,st.wy);
    if(sx<10||sx>CW-10||sy<24||sy>CH-8)return false;
    const fs=(major||land)?15:13;
    const furiFs=Math.max(9,Math.round(fs*0.62));
    ctx.font=(major?"800 ":"700 ")+fs+'px '+getJP();
    const tw=ctx.measureText(st.name).width;
    ctx.font="600 "+furiFs+'px '+getJP();
    const yw=ctx.measureText(YOMI[st.name]||"").width;
    const boxW=Math.max(tw,yw);
    const r=(vis.length>=2||major)?rBase+2:rBase+1;
    const cands=[{x:sx+r+5,a:"left"},{x:sx-r-5,a:"right"},{x:sx,a:"center"}];
    let pick=null;
    for(const cd of cands){
      let bx=cd.a==="left"?cd.x:cd.a==="right"?cd.x-boxW:cd.x-boxW/2;
      const box={x:bx-3,y:sy-fs/2-furiFs-4,w:boxW+6,h:fs+furiFs+8};
      if(box.x<3||box.x+box.w>CW-3)continue;
      if(!overlaps(box)){pick={cd,box};break;}
    }
    if(!pick){if(!force)return false;pick={cd:{x:sx+r+5,a:"left"},box:{x:sx+r+2,y:sy-fs/2-furiFs-4,w:boxW+6,h:fs+furiFs+8}};}
    placed.push(pick.box);
    drawLabel(st,pick.cd.x,sy,pick.cd.a,fs,furiFs,major,tw);
    return true;
  }
  const showCap=zoomR>1.7;
  for(const st of stList){
    if(!LAND[st.name]||!visLines(st).length)continue;
    const[sx,sy]=w2s(st.wx,st.wy);
    if(sx<16||sx>CW-16||sy<48||sy>CH-6)continue;
    const ex=sx,ey=sy-rBase-17;
    const box={x:ex-14,y:ey-14,w:28,h:28};
    if(overlaps(box))continue;
    ctx.beginPath();ctx.arc(ex,ey,13,0,7);ctx.fillStyle="#fff";ctx.fill();
    ctx.lineWidth=2;ctx.strokeStyle="rgba(120,140,170,.55)";ctx.stroke();
    ctx.font="20px serif";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(LAND[st.name][0],ex,ey+1);
    placed.push(box);
    if(showCap){
      const cap=LAND[st.name][1];
      ctx.font="700 11px "+getJP();
      const cw=ctx.measureText(cap).width,cy=ey-27;
      const cbox={x:ex-cw/2-3,y:cy-8,w:cw+6,h:16};
      if(!overlaps(cbox)){
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.lineWidth=3.2;ctx.strokeStyle="rgba(255,255,255,.96)";ctx.strokeText(cap,ex,cy);
        ctx.fillStyle="#e8730a";ctx.fillText(cap,ex,cy);
        placed.push(cbox);
      }
    }
    placeName(st,true);named.add(st.name);
  }

  // ほかの駅名 ＋ ふりがな（拡大すると ぜんぶ でる。動かしている間は おもな駅だけで サクサク）
  const fast=interacting;
  for(const st of stList){
    if(named.has(st.name))continue;
    const major=st.deg>=4;
    const force=(st===flashSt||st===hoverSt);
    if(!major&&!showMinor&&!force)continue;
    if(fast&&!major&&!force)continue;
    placeName(st,force);
  }

  if(hoverSt)ring(hoverSt,"#ff8c42");
  if(flashSt&&performance.now()<flashUntil)ring(flashSt,"#ff8c42");
  if(particles.length){
    for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.02;}
    particles=particles.filter(p=>p.life>0);
    ctx.textAlign="center";ctx.textBaseline="middle";
    for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);
      if(p.star){ctx.font="16px serif";ctx.fillText("⭐",p.x,p.y);}
      else{ctx.beginPath();ctx.arc(p.x,p.y,4,0,7);ctx.fillStyle=p.col;ctx.fill();}}
    ctx.globalAlpha=1;
  }
  if((flashSt&&performance.now()<flashUntil)||particles.length)requestAnimationFrame(draw);
  updateHint();
}

function strokeLine(L){
  ctx.beginPath();let started=false;
  for(const nm of L.s){const st=stations[nm];if(!st)continue;const[sx,sy]=w2s(st.wx,st.wy);if(!started){ctx.moveTo(sx,sy);started=true;}else ctx.lineTo(sx,sy);}
  ctx.stroke();
}
function drawLabel(st,x,y,align,fs,furiFs,major,tw){
  const cx=align==="left"?x+tw/2:align==="right"?x-tw/2:x;
  // ふりがな
  const yomi=YOMI[st.name];
  if(yomi){
    ctx.textAlign="center";ctx.textBaseline="middle";ctx.font="600 "+furiFs+'px '+getJP();
    const fy=y-fs/2-furiFs/2-1;
    ctx.lineWidth=3;ctx.strokeStyle="rgba(255,255,255,.95)";ctx.strokeText(yomi,cx,fy);
    ctx.fillStyle="#8a93a3";ctx.fillText(yomi,cx,fy);
  }
  // かんじ
  ctx.textAlign=align;ctx.textBaseline="middle";ctx.font=(major?"800 ":"700 ")+fs+'px '+getJP();
  ctx.lineWidth=major?4:3.4;ctx.strokeStyle="rgba(255,255,255,.96)";ctx.strokeText(st.name,x,y);
  ctx.fillStyle=major?"#1f2630":"#2f3640";ctx.fillText(st.name,x,y);
}
function ring(st,col){
  const vis=visLines(st);if(!vis.length)return;
  const[sx,sy]=w2s(st.wx,st.wy);
  ctx.beginPath();ctx.arc(sx,sy,12,0,7);ctx.lineWidth=3;ctx.strokeStyle=col;ctx.stroke();
}

/* ===== 操作 ===== */
let dragging=false,lastX=0,lastY=0,downX=0,downY=0;
cv.addEventListener('mousedown',e=>{dragging=true;lastX=downX=e.clientX;lastY=downY=e.clientY;cv.classList.add('drag');});
window.addEventListener('mouseup',e=>{dragging=false;cv.classList.remove('drag');
  if(quiz.on&&Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY)<6){const r=cv.getBoundingClientRect();quizAnswer(e.clientX-r.left,e.clientY-r.top);}
});
window.addEventListener('mousemove',e=>{
  if(dragging){view.cx-=(e.clientX-lastX)/view.scale;view.cy-=(e.clientY-lastY)/view.scale;lastX=e.clientX;lastY=e.clientY;markInteract();scheduleDraw();}
  else hoverTest(e);
});
cv.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect();zoomAt(Math.pow(1.0015,-e.deltaY),e.clientX-r.left,e.clientY-r.top);},{passive:false});
function zoomAt(f,sx,sy){
  const ns=clampScale(view.scale*f);if(ns===view.scale)return;
  const[bx,by]=s2w(sx,sy);view.scale=ns;const[ax,ay]=s2w(sx,sy);view.cx+=bx-ax;view.cy+=by-ay;markInteract();scheduleDraw();
}
let touchMode=0,tLX=0,tLY=0,tDist=0,tCx=0,tCy=0,tapX=0,tapY=0,tapMoved=false;
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1){touchMode=1;tLX=tapX=e.touches[0].clientX;tLY=tapY=e.touches[0].clientY;tapMoved=false;}
  else if(e.touches.length===2){touchMode=2;tapMoved=true;const[a,b]=e.touches;tDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);const r=cv.getBoundingClientRect();tCx=(a.clientX+b.clientX)/2-r.left;tCy=(a.clientY+b.clientY)/2-r.top;}
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(touchMode===1&&e.touches.length===1){const t=e.touches[0];if(Math.abs(t.clientX-tapX)+Math.abs(t.clientY-tapY)>8)tapMoved=true;view.cx-=(t.clientX-tLX)/view.scale;view.cy-=(t.clientY-tLY)/view.scale;tLX=t.clientX;tLY=t.clientY;markInteract();scheduleDraw();}
  else if(touchMode===2&&e.touches.length===2){const[a,b]=e.touches;const nd=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);zoomAt(nd/tDist,tCx,tCy);tDist=nd;}
},{passive:false});
cv.addEventListener('touchend',e=>{
  if(touchMode===1&&!tapMoved&&e.changedTouches.length){
    const r=cv.getBoundingClientRect(),t=e.changedTouches[0],mx=t.clientX-r.left,my=t.clientY-r.top;
    if(quiz.on){quizAnswer(mx,my);}
    else{const st=pickStation(mx,my,24);if(st){hoverSt=st;draw();showTip(st,t.clientX,t.clientY);}else{hoverSt=null;hideTip();draw();}}
  }
  touchMode=0;
});

const tip=document.getElementById('tip');
function pickStation(mx,my,rad){
  let best=null,bd=rad*rad;
  for(const st of stList){if(!visLines(st).length)continue;const[sx,sy]=w2s(st.wx,st.wy);const d=(sx-mx)*(sx-mx)+(sy-my)*(sy-my);if(d<bd){bd=d;best=st;}}
  return best;
}
function showTip(st,px,py){
  const vis=visLines(st),land=LAND[st.name];
  tip.innerHTML='<b>'+st.name+'</b>'+(YOMI[st.name]?'<div class="furi">'+YOMI[st.name]+'</div>':'')+
    (land?'<div class="furi">'+land[0]+' '+land[1]+'</div>':'')+
    '<div class="tlines">'+vis.map(li=>'<div class="tline"><i style="background:'+LINES[li].c+'"></i>'+LINES[li].n+'</div>').join('')+'</div>';
  tip.style.display='block';
  const tw=tip.offsetWidth,th=tip.offsetHeight;
  let x=px+16,y=py+16;
  if(x+tw>window.innerWidth-8)x=px-tw-16;
  if(x<8)x=8;
  if(y+th>window.innerHeight-8)y=py-th-16;
  if(y<8)y=8;
  tip.style.left=x+'px';tip.style.top=y+'px';
}
function hideTip(){tip.style.display='none';}
function hoverTest(e){
  if(quiz.on){return;}
  const r=cv.getBoundingClientRect();
  const best=pickStation(e.clientX-r.left,e.clientY-r.top,15);
  if(best!==hoverSt){hoverSt=best;draw();}
  if(best)showTip(best,e.clientX,e.clientY);else hideTip();
}
cv.addEventListener('mouseleave',()=>{hoverSt=null;hideTip();draw();});

function flyTo(name){
  const st=stations[name];if(!st)return;
  const tScale=clampScale(fitScale*7),s0=view.scale,cx0=view.cx,cy0=view.cy,t0=performance.now(),dur=620;
  flashSt=st;flashUntil=t0+dur+1600;
  function step(now){let k=Math.min(1,(now-t0)/dur);k=1-Math.pow(1-k,3);view.scale=s0+(tScale-s0)*k;view.cx=cx0+(st.wx-cx0)*k;view.cy=cy0+(st.wy-cy0)*k;interacting=(k<1);draw();if(k<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}

/* ===== UI ===== */
function groupIdxs(gid){const a=[];LINES.forEach((L,li)=>{if(L.g===gid)a.push(li);});return a;}
function refreshLegend(){
  document.querySelectorAll('.lrow').forEach(r=>r.classList.toggle('off',!!hidden[+r.dataset.li]));
  GROUPS.forEach(G=>{
    const idxs=groupIdxs(G.id),allHidden=idxs.every(li=>hidden[li]);
    const btn=document.querySelector('.grpbtn[data-g="'+G.id+'"]');
    if(btn)btn.classList.toggle('off',allHidden);
  });
}
const grpWrap=document.getElementById('grpbtns');
GROUPS.forEach(G=>{
  const b=document.createElement('button');b.className='grpbtn';b.dataset.g=G.id;
  b.innerHTML='<span class="sw" style="background:'+G.c+'"></span>'+G.label;
  b.onclick=()=>{
    const idxs=groupIdxs(G.id),anyVisible=idxs.some(li=>!hidden[li]);
    idxs.forEach(li=>{hidden[li]=anyVisible;}); // 見えている線があれば全部消す／全部消えていれば全部出す
    refreshLegend();scheduleDraw();
  };
  grpWrap.appendChild(b);
});
const linesWrap=document.getElementById('lines');
LINES.forEach((L,li)=>{
  const row=document.createElement('div');row.className='lrow';row.dataset.g=L.g;row.dataset.li=li;
  row.innerHTML='<span class="bar" style="background:'+L.c+'"></span><span>'+L.n+'</span>';
  row.onclick=()=>{hidden[li]=!hidden[li];refreshLegend();scheduleDraw();};
  linesWrap.appendChild(row);
});

const search=document.getElementById('search'),sug=document.getElementById('sug');
const names=Object.keys(stations);
function renderSug(q){
  if(!q){sug.classList.remove('open');sug.innerHTML='';return;}
  const hits=names.filter(n=>n.indexOf(q)>=0||(YOMI[n]||'').indexOf(q)>=0).sort((a,b)=>stations[b].deg-stations[a].deg).slice(0,8);
  if(!hits.length){sug.classList.remove('open');sug.innerHTML='';return;}
  sug.innerHTML=hits.map(n=>{
    const dots=stations[n].lines.slice(0,6).map(li=>'<i style="background:'+LINES[li].c+'"></i>').join('');
    return '<div class="sug" data-n="'+n+'"><span class="nm"><b>'+n+'</b><em>'+(YOMI[n]||'')+'</em></span><span class="dotrow">'+dots+'</span></div>';
  }).join('');
  sug.classList.add('open');
  sug.querySelectorAll('.sug').forEach(el=>el.onclick=()=>choose(el.dataset.n));
}
function choose(n){search.value=n;sug.classList.remove('open');flyTo(n);}
search.addEventListener('input',()=>renderSug(search.value.trim()));
search.addEventListener('keydown',e=>{if(e.key==='Enter'){const f=sug.querySelector('.sug');if(f)choose(f.dataset.n);}});
document.addEventListener('click',e=>{if(!e.target.closest('#searchWrap'))sug.classList.remove('open');});

/* ===== 知育クイズ「えきさがし」＋スタンプ ===== */
function beep(kind){
  if(muted)return;
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  const t=actx.currentTime;
  if(kind==='win'){[523,659,784,1046].forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);const tt=t+i*0.09;o.frequency.setValueAtTime(f,tt);g.gain.setValueAtTime(0.18,tt);g.gain.exponentialRampToValueAtTime(0.001,tt+0.22);o.start(tt);o.stop(tt+0.22);});return;}
  const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);
  if(kind==='ok'){o.frequency.setValueAtTime(660,t);o.frequency.setValueAtTime(990,t+0.11);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.34);o.start(t);o.stop(t+0.34);}
  else{o.type='square';o.frequency.setValueAtTime(160,t);g.gain.setValueAtTime(0.16,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.start(t);o.stop(t+0.3);}
}
function burst(x,y){
  const cols=['#ff5252','#ffca28','#66bb6a','#42a5f5','#ab47bc','#ff9800'];
  for(let i=0;i<26;i++){const a=Math.random()*6.283,sp=2+Math.random()*4.5;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,life:1,col:cols[i%cols.length],star:i%4===0});}
}
function quizPool(){
  const lvl=quiz.score<5?1:quiz.score<12?2:3;
  return stList.filter(s=>{
    if(!s.lines.length)return false;
    if(lvl===1)return LAND[s.name]||s.deg>=4;
    if(lvl===2)return LAND[s.name]||s.deg>=2;
    return true;
  });
}
function quizPrompt(){
  const t=quiz.target;if(!t)return'';
  const L=LAND[t.name];
  if(L)return L[0]+' 「'+L[1]+'」の えきは どこかな？';
  return '「'+(YOMI[t.name]||t.name)+'」は どこかな？';
}
function showQuizQ(){document.getElementById('quizQ').textContent=quizPrompt();}
function updateQuizChips(){document.getElementById('quizScore').textContent='⭐ '+quiz.score;document.getElementById('quizStreak').textContent='れんぞく '+quiz.streak;}
function setQuizMsg(t){document.getElementById('quizMsg').textContent=t;}
function pickTarget(){
  const pool=quizPool();let t,n=0;do{t=pool[Math.floor(Math.random()*pool.length)];n++;}while(t===quiz.target&&n<12);
  quiz.target=t;quiz.misses=0;showQuizQ();updateQuizChips();setQuizMsg('');
}
function quizAnswer(sx,sy){
  if(!quiz.target)return;
  const[tx,ty]=w2s(quiz.target.wx,quiz.target.wy),d=Math.hypot(sx-tx,sy-ty),near=pickStation(sx,sy,40);
  if(d<30||near===quiz.target){
    quiz.score++;quiz.streak++;quiz.collected.add(quiz.target.name);
    burst(tx,ty);beep(quiz.streak%5===0?'win':'ok');
    setQuizMsg('⭕ せいかい！ すごい！');updateQuizChips();
    setTimeout(()=>{pickTarget();scheduleDraw();},950);
  }else{
    quiz.misses++;quiz.streak=0;beep('ng');updateQuizChips();
    if(quiz.misses>=2){setQuizMsg('ここだよ！ ⭐');flashSt=quiz.target;flashUntil=performance.now()+1500;burst(tx,ty);setTimeout(()=>{pickTarget();scheduleDraw();},1400);}
    else{setQuizMsg('ちがうよ！ もういちど 🔍');}
  }
  scheduleDraw();
}
function startQuiz(){quiz.on=true;quiz.score=0;quiz.streak=0;document.body.classList.add('quizzing');document.getElementById('playBtn').style.display='none';document.getElementById('quizBar').classList.add('on');document.getElementById('tip').style.display='none';computeFit();pickTarget();scheduleDraw();}
function stopQuiz(){quiz.on=false;document.body.classList.remove('quizzing');document.getElementById('playBtn').style.display='';document.getElementById('quizBar').classList.remove('on');scheduleDraw();}
document.getElementById('playBtn').onclick=startQuiz;
document.getElementById('quizClose').onclick=stopQuiz;
document.getElementById('quizSkip').onclick=()=>{quiz.streak=0;updateQuizChips();pickTarget();scheduleDraw();};
document.getElementById('quizMute').onclick=()=>{muted=!muted;document.getElementById('quizMute').textContent=muted?'🔇':'🔊';};

window.addEventListener('load',resize);
